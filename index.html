    <title>WagyuMate - 黒毛和牛繁殖管理</title>
    
    <!-- Using Tailwind via CDN for simplicity as per original setup. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              wagyu: {
                50: '#f2fcf5',
                100: '#e1f8e8',
                500: '#22c55e',
                600: '#16a34a', /* Added missing color definition */
                700: '#15803d',
                900: '#14532d',
              },
              gold: '#fbbf24',
              silver: '#94a3b8',
              bronze: '#b45309',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for mobile feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 10px;
      }
      .animate-pop {
        animation: pop 0.3s ease-out;
      }
      @keyframes pop {
        0% { transform: scale(0.9); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      /* Prevent pull-to-refresh on mobile which feels less app-like */
      body {
        overscroll-behavior-y: none;
      }
      /* Safe area padding for iPhones with notches */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
